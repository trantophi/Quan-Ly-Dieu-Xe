<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0B1628">
<title>Công Ty Demo Logistic — Hệ Thống Điều Xe V11</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{background:#F0F4F8;font-family:'Be Vietnam Pro',sans-serif;font-size:14px;color:#1E293B;-webkit-overflow-scrolling:touch}

:root{
  --red:#DC2626;--navy:#0B1628;--blue:#1D4ED8;--blue2:#1E40AF;
  --green:#059669;--amber:#D97706;--purple:#7C3AED;
  --card:#fff;--border:#E2E8F0;--muted:#64748B;
}

/* Loader */
#loader{position:fixed;inset:0;background:rgba(255,255,255,.92);z-index:9999;display:none;justify-content:center;align-items:center;flex-direction:column}
.spin{width:38px;height:38px;border:3px solid #E2E8F0;border-top-color:var(--red);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* Card */
.card-biz{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border);margin-bottom:14px}

/* Topbar */
#topbar{background:var(--navy);border-radius:12px;padding:11px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
#topbar .nm{color:#fff;font-weight:800;text-transform:uppercase;font-size:14px;letter-spacing:.3px}
.rbadge{background:var(--red);color:#fff;font-size:10px;padding:2px 9px;border-radius:20px;font-weight:700;margin-top:3px;display:inline-block}

/* Buttons */
.btn-red,.btn-blue,.btn-green,.btn-amber,.btn-purple{color:#fff;border:none;font-weight:700;border-radius:7px;min-height:42px;cursor:pointer;font-family:inherit;font-size:13px;transition:opacity .15s}
.btn-red{background:var(--red)}.btn-red:active{opacity:.85}
.btn-blue{background:var(--blue)}.btn-blue:active{opacity:.85}
.btn-green{background:var(--green)}.btn-green:active{opacity:.85}
.btn-amber{background:var(--amber)}.btn-amber:active{opacity:.85}
.btn-purple{background:var(--purple)}.btn-purple:active{opacity:.85}
@media(hover:hover){
  .btn-red:hover{background:#B91C1C}.btn-blue:hover{background:var(--blue2)}
  .btn-green:hover{background:#047857}.btn-amber:hover{background:#B45309}
  .btn-purple:hover{background:#6D28D9}
}

/* Nav */
.nav-pills .nav-link{font-weight:700;border-radius:8px;font-size:12px;color:var(--muted);padding:8px 12px;font-family:inherit}
.nav-pills .nav-link.active{background:var(--blue);color:#fff}

/* Form */
.form-control,.form-select{border-radius:7px;padding:9px 12px;font-size:13px;border:1px solid var(--border);font-family:inherit}
.form-control:focus,.form-select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.12);outline:none}
.form-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

/* Pills */
.pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block}
.pill-red{background:#FEE2E2;color:#991B1B}
.pill-green{background:#D1FAE5;color:#065F46}
.pill-amber{background:#FEF3C7;color:#92400E}
.pill-blue{background:#DBEAFE;color:#1E3A8A}
.pill-purple{background:#EDE9FE;color:#5B21B6}
.pill-gray{background:#F1F5F9;color:#475569}

/* Trip card */
.trip-card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px;margin-bottom:11px;transition:border-color .15s}
.trip-card:hover{border-color:var(--blue)}

/* Table */
.table{font-size:12px}.table thead th{background:#F8FAFC;font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.4px;vertical-align:middle;white-space:nowrap}
.table td{vertical-align:middle;padding:8px 10px}
.table-responsive{-webkit-overflow-scrolling:touch;overflow-x:auto}

/* Live dot */
.dot-live{width:7px;height:7px;background:var(--green);border-radius:50%;display:inline-block}
@media(prefers-reduced-motion:no-preference){.dot-live{animation:pulse 1.8s infinite}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

/* Notif */
#notifBar{background:linear-gradient(90deg,var(--red),#B91C1C);color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:12px;display:none}

/* Login */
#loginView{background:linear-gradient(135deg,#0B1628 0%,#1E3A5F 50%,#0B1628 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-logo{width:54px;height:54px;background:var(--red);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;color:#fff}

/* Stat cards */
.stat-card{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:14px 16px}
.stat-val{font-size:22px;font-weight:800;color:var(--navy);margin:4px 0 2px;letter-spacing:-.5px}
.stat-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.stat-sub{font-size:11px;color:var(--muted)}

/* Report table */
.rpt-tbl{font-size:12px;width:100%;border-collapse:collapse}
.rpt-tbl th{background:#F8FAFC;padding:8px 10px;font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)}
.rpt-tbl td{padding:8px 10px;border-bottom:1px solid #F1F5F9}
.rpt-tbl tr:last-child td{border-bottom:none}
.rpt-tbl tfoot td{font-weight:700;background:#F8FAFC;border-top:2px solid var(--border)}

/* Debt row colors */
.row-warn{background:#FFFBEB}.row-danger{background:#FFF5F5}

.hidden{display:none!important}
@media(max-width:576px){#topbar{flex-direction:column;gap:8px;text-align:center}.card-biz{padding:12px}}
@media(max-width:360px){body{font-size:13px}.nav-pills .nav-link{font-size:10px;padding:6px 8px}}
</style>
</head>
<body>

<div id="loader"><div class="spin"></div><div style="margin-top:12px;font-weight:700;color:var(--navy);font-size:13px">ĐANG XỬ LÝ...</div></div>

<!-- LOGIN -->
<div id="loginView">
  <div class="login-card">
    <div class="login-logo">🚛</div>
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-weight:800;font-size:16px;color:var(--navy);text-transform:uppercase;letter-spacing:.5px">CÔNG TY DEMO LOGISTIC</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">Hệ Thống Quản Lý Điều Xe V11</div>
      <div style="margin-top:10px;padding:8px 12px;background:#EFF6FF;border-radius:8px;font-size:11px;color:var(--blue2)">
        💡 <b>Demo:</b> Chọn tài khoản bên dưới để trải nghiệm
      </div>
    </div>
    <!-- Quick login buttons -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px">
      <button onclick="quickLogin('ADM001','Admin')" style="padding:10px;border:1.5px solid var(--blue);border-radius:8px;background:#EFF6FF;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;color:var(--blue2)">
        🛡️ Admin
      </button>
      <button onclick="quickLogin('DX001','Điều xe')" style="padding:10px;border:1.5px solid var(--red);border-radius:8px;background:#FEF2F2;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;color:var(--red)">
        📋 Điều Xe
      </button>
      <button onclick="quickLogin('TX001','Tài xế')" style="padding:10px;border:1.5px solid var(--green);border-radius:8px;background:#F0FDF4;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;color:var(--green)">
        🚛 Tài Xế
      </button>
      <button onclick="quickLogin('KT001','Kế toán')" style="padding:10px;border:1.5px solid var(--purple);border-radius:8px;background:#F5F3FF;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;color:var(--purple)">
        📊 Kế Toán
      </button>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:16px;margin-bottom:16px;text-align:center;font-size:11px;color:var(--muted)">Hoặc đăng nhập thủ công</div>
    <input type="text" id="u" class="form-control mb-2" placeholder="Mã đăng nhập (VD: ADM001)">
    <div style="position:relative;margin-bottom:12px">
      <input type="password" id="p" class="form-control" placeholder="Mật khẩu" onkeydown="if(event.key==='Enter')handleLogin()" style="padding-right:42px">
      <button onclick="togglePwd()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted)"><span id="eye">👁</span></button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <label style="cursor:pointer;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)">
        <input type="checkbox" id="rem" style="width:14px;height:14px">Ghi nhớ
      </label>
      <span style="font-size:12px;color:var(--blue2);font-weight:600;cursor:pointer" onclick="forgotPwd()">Quên mật khẩu?</span>
    </div>
    <button onclick="handleLogin()" class="btn-red w-100 py-2" style="border-radius:8px;font-size:14px">ĐĂNG NHẬP</button>
    <div style="margin-top:16px;padding:10px;background:#F8FAFC;border-radius:8px;font-size:10px;color:var(--muted);text-align:center">
      ⚠️ Đây là bản demo. Dữ liệu không lưu vào Google Sheet thật.
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainView" class="container-fluid py-3 px-3 hidden" style="max-width:1100px">
  <div id="topbar">
    <div>
      <div class="nm" id="uName">...</div>
      <span class="rbadge" id="uRole">...</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="clkTime" style="color:#94A3B8;font-size:11px;font-weight:600"></span>
      <button onclick="doLogout()" style="background:none;border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">
        <i class="bi bi-box-arrow-right me-1"></i>THOÁT
      </button>
    </div>
  </div>
  <div id="notifBar"></div>
  <ul class="nav nav-pills nav-fill mb-3 bg-white p-2 rounded" style="border:1px solid var(--border)" id="navTabs">
    <li class="nav-item"><a class="nav-link active" onclick="switchTab('work',this)"><i class="bi bi-briefcase-fill me-1"></i>TÁC NGHIỆP</a></li>
    <li class="nav-item"><a class="nav-link" onclick="switchTab('history',this)"><i class="bi bi-clock-history me-1"></i>LỊCH SỬ</a></li>
    <li class="nav-item hidden" id="tabReport"><a class="nav-link" onclick="switchTab('report',this)"><i class="bi bi-bar-chart-line-fill me-1"></i>LÃI LỖ</a></li>
    <li class="nav-item hidden" id="tabDebt"><a class="nav-link" onclick="switchTab('debt',this)"><i class="bi bi-currency-dollar me-1"></i>CÔNG NỢ</a></li>
  </ul>
  <div id="content"></div>
</div>

<script>
/* ════════════════════════════════════════════
   MOCK DATA — mô phỏng dữ liệu thực tế
════════════════════════════════════════════ */
const USERS = {
  'ADM001': {ma:'ADM001',ten:'Nguyễn Quản Trị',role:'Admin',pass:'Admin@2026'},
  'DX001' : {ma:'DX001', ten:'Trần Điều Xe',   role:'Điều xe',pass:'DX@2026'},
  'KT001' : {ma:'KT001', ten:'Lê Kế Toán',     role:'Kế toán',pass:'KT@2026'},
  'GD001' : {ma:'GD001', ten:'Phạm Giám Đốc',  role:'Giám đốc',pass:'GD@2026'},
  'TX001' : {ma:'TX001', ten:'Nguyễn Văn An',   role:'Tài xế',pass:'TX@2026'},
  'TX002' : {ma:'TX002', ten:'Trần Văn Bình',   role:'Tài xế',pass:'TX@2026'},
};

const VEHICLES = [
  {ma:'60C-478.81',loai:'Xe tải',tai:10},
  {ma:'60H-080.44',loai:'Xe tải',tai:10},
  {ma:'60H-239.70',loai:'Xe tải',tai:5},
  {ma:'60H-239.74',loai:'Xe tải',tai:5},
  {ma:'60H-312.32',loai:'Xe tải',tai:10},
  {ma:'60H-312.87',loai:'Xe tải',tai:10},
  {ma:'66H-009.21',loai:'Xe tải',tai:10},
];

const DRIVERS = [
  {ma:'TX001',ten:'Nguyễn Văn An',email:'an@demo.com'},
  {ma:'TX002',ten:'Trần Văn Bình',email:'binh@demo.com'},
];

const CUSTOMERS = [
  {ma:'KH001',ten:'Taiji Co., Ltd',hh:0.0866},
  {ma:'KH002',ten:'Công ty AK',hh:0},
  {ma:'KH003',ten:'Ngô Han',hh:0},
  {ma:'KH004',ten:'Inox Tương Lai',hh:0},
  {ma:'KH005',ten:'Xốp Sâm Hưng',hh:0},
];

const DM_CHI_PHI = [
  {ma:'CP001',ten:'Sửa Xe'},
  {ma:'CP002',ten:'Dầu DO'},
  {ma:'CP003',ten:'Đăng Kiểm'},
  {ma:'CP004',ten:'Tiền Ăn'},
  {ma:'CP005',ten:'Tiền Vé'},
  {ma:'CP006',ten:'Phí Không Dừng'},
  {ma:'CP007',ten:'Khác'},
];

// Chuyến xe mock
let TRIPS = [
  {row:3,id:'CX260101-12',ngayDi:'01/01/2026',ngayVe:'03/01/2026',bienSo:'60H-080.44',maTX:'TX001',tenTX:'Nguyễn Văn An',dienGiai:'Hyosung → 417 Thùng',maKH:'KH001',tenKH:'Taiji Co., Ltd',giaTT:1847519,giaHD:2000000,pctHH:0.0866,dtThuc:1687500,tongCP:471000,laiGop:1216500,kmDau:125000,kmCuoi:125500,gioCoMat:'07:00',diemTapKet:'Bãi xe công ty',trangThaiTBao:'Đã gửi'},
  {row:4,id:'CX260102-34',ngayDi:'02/01/2026',ngayVe:'02/01/2026',bienSo:'60H-239.70',maTX:'TX002',tenTX:'Trần Văn Bình',dienGiai:'AK Biên Hòa → Long An',maKH:'KH002',tenKH:'Công ty AK',giaTT:2200000,giaHD:2400000,pctHH:0,dtThuc:2200000,tongCP:402000,laiGop:1798000,kmDau:98500,kmCuoi:99200,gioCoMat:'06:00',diemTapKet:'Bãi xe công ty',trangThaiTBao:'Đã gửi'},
  {row:5,id:'CX260105-77',ngayDi:'05/01/2026',ngayVe:'',bienSo:'60H-312.87',maTX:'TX001',tenTX:'Nguyễn Văn An',dienGiai:'Inox Tương Lai → TP.HCM',maKH:'KH004',tenKH:'Inox Tương Lai',giaTT:1500000,giaHD:1600000,pctHH:0,dtThuc:1500000,tongCP:210000,laiGop:1290000,kmDau:132000,kmCuoi:'',gioCoMat:'08:00',diemTapKet:'Bãi xe công ty',trangThaiTBao:'Đã gửi'},
  {row:6,id:'CX260107-55',ngayDi:'07/01/2026',ngayVe:'',bienSo:'66H-009.21',maTX:'TX002',tenTX:'Trần Văn Bình',dienGiai:'Xốp Sâm Hưng → Bình Dương',maKH:'KH005',tenKH:'Xốp Sâm Hưng',giaTT:3100000,giaHD:3400000,pctHH:0,dtThuc:3100000,tongCP:803000,laiGop:2297000,kmDau:145200,kmCuoi:'',gioCoMat:'07:30',diemTapKet:'Bãi xe công ty',trangThaiTBao:'Đang xử lý...'},
];

let CONG_NO = [
  {row:3,maCN:'CN001',maChuyen:'CX260101-12',ngay:'01/01/2026',loaiNo:'Khách hàng nợ',doiTuong:'Taiji Co., Ltd',maDoiTuong:'KH001',tongPT:1687500,daThu:843750,conNo:843750,hanThu:'10/01/2026',ngayClear:''},
  {row:4,maCN:'CN002',maChuyen:'CX260102-34',ngay:'02/01/2026',loaiNo:'Khách hàng nợ',doiTuong:'Công ty AK',maDoiTuong:'KH002',tongPT:2200000,daThu:2200000,conNo:0,hanThu:'09/01/2026',ngayClear:'02/01/2026'},
  {row:5,maCN:'TX001A',maChuyen:'CX260105-77',ngay:'05/01/2026',loaiNo:'Tài xế nợ quỹ',doiTuong:'Nguyễn Văn An',maDoiTuong:'TX001',tongPT:1500000,daThu:0,conNo:1500000,hanThu:'07/01/2026',ngayClear:''},
];

/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */
let user = {}, appData = {};
let tripCounter = 8;

/* ════════════════════════════════════════════
   FORMAT HELPERS
════════════════════════════════════════════ */
function fmtVND(n){if(!n&&n!==0)return'—';return Number(n).toLocaleString('vi-VN')+' ₫'}
function fmtKM(n){if(!n&&n!==0)return'—';return Number(n).toLocaleString('vi-VN')+' km'}
function fmtNum(n){if(!n&&n!==0)return'—';return Number(n).toLocaleString('vi-VN')}
function toggleLoader(s){document.getElementById('loader').style.display=s?'flex':'none'}
function togglePwd(){const p=document.getElementById('p'),e=document.getElementById('eye');p.type=p.type==='password'?'text':'password';e.textContent=p.type==='password'?'👁':'🙈'}

/* ════════════════════════════════════════════
   CLOCK
════════════════════════════════════════════ */
function startClock(){
  setInterval(()=>{
    const now=new Date();
    const el=document.getElementById('clkTime');
    if(el)el.textContent=now.toLocaleString('vi-VN',{weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  },1000);
}

/* ════════════════════════════════════════════
   AUTH
════════════════════════════════════════════ */
function quickLogin(ma, role){
  const u=USERS[ma];
  if(!u)return;
  document.getElementById('u').value=ma;
  document.getElementById('p').value=u.pass;
  setTimeout(handleLogin,100);
}

function handleLogin(){
  const u=document.getElementById('u').value.trim();
  const p=document.getElementById('p').value.trim();
  if(!u||!p)return Swal.fire('Thiếu thông tin','Nhập đầy đủ tài khoản và mật khẩu.','warning');
  toggleLoader(true);
  setTimeout(()=>{
    toggleLoader(false);
    const found=Object.values(USERS).find(x=>x.ma.toLowerCase()===u.toLowerCase()&&x.pass===p);
    if(found){
      if(document.getElementById('rem').checked){localStorage.setItem('demo_u',u);localStorage.setItem('demo_p',p);}
      else{localStorage.removeItem('demo_u');localStorage.removeItem('demo_p');}
      user=found;
      setupApp();
    }else{
      Swal.fire({icon:'error',title:'Đăng nhập thất bại',text:'Sai tài khoản hoặc mật khẩu.',confirmButtonColor:'#DC2626'});
    }
  },600);
}

function forgotPwd(){Swal.fire('Thông báo','Trong bản demo, mật khẩu = tên role + @2026\nVD: Admin@2026, DX@2026, TX@2026','info')}
function doLogout(){location.reload()}

window.onload=()=>{
  const su=localStorage.getItem('demo_u'),sp=localStorage.getItem('demo_p');
  if(su){document.getElementById('u').value=su;document.getElementById('rem').checked=true;}
  if(sp)document.getElementById('p').value=sp;
};

/* ════════════════════════════════════════════
   SETUP APP
════════════════════════════════════════════ */
function setupApp(){
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('mainView').classList.remove('hidden');
  document.getElementById('uName').textContent=user.ten;
  document.getElementById('uRole').textContent=user.role;

  // Build appData
  appData={
    activeTrips : TRIPS.filter(t=>!t.ngayVe&&t.maTX===user.ma||(!t.ngayVe&&user.role!=='Tài xế')).filter(t=>user.role==='Tài xế'?t.maTX===user.ma:true).filter(t=>!t.ngayVe),
    historyTrips: TRIPS.filter(t=>t.ngayVe&&(user.role==='Tài xế'?t.maTX===user.ma:true)),
    vehicles    : VEHICLES,
    drivers     : DRIVERS,
    customers   : CUSTOMERS,
    routes      : CUSTOMERS.map(c=>({ma:c.ma,ten:c.ten})),
    danhMucChiPhi: DM_CHI_PHI,
    myDebts     : CONG_NO.filter(d=>d.loaiNo==='Tài xế nợ quỹ'&&d.maDoiTuong===user.ma&&d.conNo>0),
  };

  if(['Admin','Kế toán','Giám đốc'].includes(user.role)){
    document.getElementById('tabReport').classList.remove('hidden');
    document.getElementById('tabDebt').classList.remove('hidden');
  }

  // Notif bar
  const active=TRIPS.filter(t=>!t.ngayVe).length;
  if(active>0){
    const nb=document.getElementById('notifBar');
    nb.style.display='block';
    nb.innerHTML=`<i class="bi bi-broadcast me-2"></i><b>${active} xe</b> đang trên đường hôm nay.`;
  }

  startClock();
  renderWork();
}

/* ════════════════════════════════════════════
   TABS
════════════════════════════════════════════ */
function switchTab(t,el){
  document.querySelectorAll('#navTabs .nav-link').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  if(t==='work')renderWork();
  else if(t==='history')renderHistory();
  else if(t==='report')renderReport();
  else if(t==='debt')renderDebt();
}

function renderReport(){
  const now=new Date();
  const def=String(now.getMonth()+1).padStart(2,'0')+'/'+now.getFullYear();
  const fth=document.getElementById('rp_th')?.value||def;
  const fxe=document.getElementById('rp_xe')?.value||'';

  document.getElementById('content').innerHTML=`
    <div class="card-biz" style="border-top:4px solid var(--blue)">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold m-0 text-primary"><i class="bi bi-bar-chart-line-fill me-2"></i>BÁO CÁO LÃI LỖ TỪNG CHUYẾN</h5>
      </div>
      <div class="row g-2 mb-3">
        <div class="col-md-3 col-6"><label class="form-label">Tháng/Năm</label><input type="text" id="rp_th" class="form-control" placeholder="MM/YYYY" value="${fth}" maxlength="7"></div>
        <div class="col-md-3 col-6"><label class="form-label">Biển Số</label>
          <select id="rp_xe" class="form-select"><option value="">-- Tất cả xe --</option>${VEHICLES.map(v=>`<option value="${v.ma}" ${fxe===v.ma?'selected':''}>${v.ma}</option>`).join('')}</select>
        </div>
        <div class="col-md-2 d-flex align-items-end"><button onclick="renderReport()" class="btn btn-blue w-100">🔍 Lọc</button></div>
      </div>
      <div id="rp_body">
        <div class="text-center py-4"><div class="spin mx-auto"></div><div class="mt-2 text-muted">Đang tính toán...</div></div>
      </div>
    </div>`;

  setTimeout(()=>{
    // Tính lãi lỗ từ mock data
    let data=TRIPS.filter(t=>t.ngayVe&&t.ngayVe!=='HỦY');
    if(fxe) data=data.filter(t=>t.bienSo===fxe);
    if(fth){
      data=data.filter(t=>{
        if(!t.ngayDi)return false;
        const p=t.ngayDi.split('/');
        return (p[1]+'/'+p[2])===fth;
      });
    }

    if(!data.length){
      document.getElementById('rp_body').innerHTML=`<div class="text-center py-4 text-muted"><i class="bi bi-inbox fs-1 d-block mb-2"></i>Không có dữ liệu.</div>`;
      return;
    }

    const tong=data.reduce((a,r)=>({dt:a.dt+r.dtThuc,cp:a.cp+r.tongCP,lg:a.lg+r.laiGop}),{dt:0,cp:0,lg:0});
    const tyLe=tong.dt>0?(tong.lg/tong.dt*100).toFixed(1):0;
    const lnColor=tong.lg>=0?'#065F46':'#991B1B';

    const summary=`<div class="row g-3 mb-4">
      <div class="col-6 col-md-3"><div class="stat-card" style="border-top:3px solid var(--blue)">
        <div class="stat-lbl">Doanh Thu</div><div class="stat-val" style="font-size:17px;color:var(--blue)">${fmtVND(tong.dt)}</div>
      </div></div>
      <div class="col-6 col-md-3"><div class="stat-card" style="border-top:3px solid var(--amber)">
        <div class="stat-lbl">Biến Phí</div><div class="stat-val" style="font-size:17px;color:var(--amber)">${fmtVND(tong.cp)}</div>
      </div></div>
      <div class="col-6 col-md-3"><div class="stat-card" style="border-top:3px solid ${lnColor}">
        <div class="stat-lbl">Lãi Gộp</div><div class="stat-val" style="font-size:17px;color:${lnColor}">${fmtVND(tong.lg)}</div>
        <div class="stat-sub">${tyLe}% tỷ suất</div>
      </div></div>
      <div class="col-6 col-md-3"><div class="stat-card" style="border-top:3px solid #6366F1">
        <div class="stat-lbl">Số Chuyến</div><div class="stat-val" style="font-size:17px;color:#6366F1">${data.length}</div>
      </div></div>
    </div>`;

    const rows=data.map(r=>{
      const lc2=r.laiGop>=0?'text-success':'text-danger';
      return `<tr>
        <td><span class="badge bg-dark" style="font-size:10px">${r.id}</span><br><small class="text-muted">${r.ngayDi}</small></td>
        <td class="fw-bold">${r.bienSo}</td>

        <td class="text-end text-muted">${fmtVND(r.tongCP)}</td>

          <thead><tr>
            <th>Mã / Ngày</th><th>Biển Số</th><th>Tài Xế / KH</th><th>Diễn Giải</th>

            <td class="text-end text-primary">${fmtVND(tong.dt)}</td>
            <td class="text-end text-warning">${fmtVND(tong.cp)}</td>
            <td class="text-end fw-bold" style="color:${lnColor}">${fmtVND(tong.lg)}</td>
            <td class="text-end" style="color:${lnColor}">${tyLe}%</td>
          </tr></tfoot>
        </table>

function autoFillHH(){
  const sel=document.getElementById('f_kh');
  if(!sel)return;
  const opt=sel.options[sel.selectedIndex];
  const hh=parseFloat(opt.dataset.hh||0)*100;
  const el=document.getElementById('f_hh');
  if(el)el.value=hh>0?hh.toFixed(2):'';
  calcDT();
}
function calcDT(){
  const gt=Number(document.getElementById('f_gia_tt')?.value||0);
  const hh=Number(document.getElementById('f_hh')?.value||0)/100;
  const dt=gt>0?Math.round(gt*(1-hh)):0;
  const el=document.getElementById('f_dt');
  if(el)el.textContent=dt>0?fmtVND(dt):'—';
}

async function submitTrip(){
  const maTX=document.getElementById('f_tx').value;
  const maKH=document.getElementById('f_kh').value;
  if(!maTX)return Swal.fire('Thiếu tài xế','Vui lòng chọn tài xế.','warning');
  if(!maKH)return Swal.fire('Thiếu khách hàng','Vui lòng chọn khách hàng.','warning');
  const dien=document.getElementById('f_dien').value;
  const giaTT=Number(document.getElementById('f_gia_tt').value||0);
  const giaHD=Number(document.getElementById('f_gia_hd').value||0);
  const pctHH=Number(document.getElementById('f_hh').value||0)/100;
  const dtThuc=giaTT>0?Math.round(giaTT*(1-pctHH)):0;
  const kmDau=Number(document.getElementById('f_km').value||0);
  if(!kmDau)return Swal.fire('Thiếu KM','Vui lòng nhập số KM đồng hồ.','warning');
  const gioh=document.getElementById('f_gio_h').value;
  const giom=document.getElementById('f_gio_m').value;
  const ngayDi=document.getElementById('f_ngay').value;
  // Format ngày DD/MM/YYYY
  const d=new Date(ngayDi);
  const ngayStr=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  const tx=DRIVERS.find(x=>x.ma===maTX)||{ten:''};
  const kh=CUSTOMERS.find(x=>x.ma===maKH)||{ten:''};
  const cpDau=Number(document.getElementById('f_dau').value||0);
  const cpAn=Number(document.getElementById('f_an').value||0);
  const cpVe=Number(document.getElementById('f_ve').value||0);
  const cpKD=Number(document.getElementById('f_kd').value||0);
  const cpSua=Number(document.getElementById('f_sua').value||0);
  const cpKhac=Number(document.getElementById('f_khac').value||0);
  const tongCP=cpDau+cpAn+cpVe+cpKD+cpSua+cpKhac;

  const ok=await Swal.fire({
    title:'Xác nhận phát lệnh?',
    html:`KH: <b>${kh.ten}</b><br>DV: <b>${dien}</b><br>Ngày: <b>${ngayStr}</b> — Giờ: <b class="text-danger">${gioh}:${giom}</b><br>Giá TT: <b>${fmtVND(giaTT)}</b> | DT Thực: <b class="text-success">${fmtVND(dtThuc)}</b>`,
    icon:'question',showCancelButton:true,confirmButtonText:'✅ Phát Lệnh',cancelButtonText:'Hủy',confirmButtonColor:'#DC2626'
  });
  if(!ok.isConfirmed)return;

  toggleLoader(true);
  setTimeout(()=>{
    toggleLoader(false);
    const yr=String(d.getFullYear()).slice(2);
    const mm=String(d.getMonth()+1).padStart(2,'0');
    const dd2=String(d.getDate()).padStart(2,'0');
    const newId=`CX${yr}${mm}${dd2}-${String(Math.floor(10+Math.random()*90))}`;
    const newTrip={row:3+TRIPS.length,id:newId,ngayDi:ngayStr,ngayVe:'',bienSo:document.getElementById('f_xe').value,maTX,tenTX:tx.ten,dienGiai:dien,maKH,tenKH:kh.ten,giaTT,giaHD,pctHH,dtThuc,tongCP,laiGop:dtThuc-tongCP,kmDau,kmCuoi:'',gioCoMat:`${gioh}:${giom}`,diemTapKet:'Bãi xe công ty',trangThaiTBao:'Đang xử lý...'};
    TRIPS.push(newTrip);
    // Tạo công nợ
    if(dtThuc>0){
      const newCN={row:3+CONG_NO.length,maCN:`CN${String(CONG_NO.length+1).padStart(3,'0')}`,maChuyen:newId,ngay:ngayStr,loaiNo:'Khách hàng nợ',doiTuong:kh.ten,maDoiTuong:maKH,tongPT:dtThuc,daThu:0,conNo:dtThuc,hanThu:'',ngayClear:''};
      CONG_NO.push(newCN);
    }
    appData.activeTrips=TRIPS.filter(t=>!t.ngayVe);
    Swal.fire({icon:'success',title:'Tạo chuyến thành công!',html:`Mã: <b>${newId}</b><br>📧 Đang gửi thông báo Google Calendar + Gmail...`,timer:2500,showConfirmButton:false});
    setTimeout(()=>{
      TRIPS.find(t=>t.id===newId).trangThaiTBao='Đã gửi';
      renderWork();
    },2600);
  },700);
}

function _updTotal(){

  if(el){el.textContent=fmtVND(t);el.style.color=t>0?'#DC2626':'#64748B';}
}

  if(!maCN)return Swal.fire('Thiếu','Nhập Mã Công Nợ.','warning');
  if(!st||st<=0)return Swal.fire('Thiếu','Nhập số tiền.','warning');
  const ok=await Swal.fire({title:'Xác nhận thu?',html:`Mã CN: <b>${maCN}</b><br>Số tiền: <b class="text-success">${fmtVND(st)}</b>`,icon:'question',showCancelButton:true,confirmButtonText:'✅ Xác nhận',confirmButtonColor:'#7C3AED'});
  if(!ok.isConfirmed)return;
  toggleLoader(true);
  setTimeout(()=>{
    toggleLoader(false);
    const cn=CONG_NO.find(x=>x.maCN===maCN);
    if(!cn)return Swal.fire('Lỗi','Không tìm thấy mã công nợ: '+maCN,'error');
    cn.daThu+=Number(st);cn.conNo=Math.max(0,cn.tongPT-cn.daThu);
    if(cn.conNo<=0)cn.ngayClear=new Date().toLocaleDateString('vi-VN');
    Swal.fire({icon:'success',title:'Ghi nhận thành công!',html:`Thu: <b>${fmtVND(st)}</b> | Còn: <b>${fmtVND(cn.conNo)}</b>`,timer:2000,showConfirmButton:false}).then(renderDebt);
  },500);
}

async function showPayModal(maCN,conNo,loaiNo){
  const ht=loaiNo==='Tài xế nợ quỹ'?'TM - Tài xế nộp quỹ':'CK - Khách hàng';
  const{value:fv}=await Swal.fire({
    title:'💰 GHI NHẬN THU',
    html:`<div style="text-align:left"><p>Mã CN: <b>${maCN}</b> — Còn: <b class="text-danger">${fmtVND(conNo)}</b></p>
      <label class="form-label">Số tiền thu</label>
      <input id="sp-amt" type="number" class="form-control mb-2" value="${conNo}" min="1" step="1000" oninput="const el=document.getElementById('sp-prev');if(el)el.textContent=this.value>0?'→ '+fmtVND(this.value):''">
      <div id="sp-prev" style="font-size:13px;color:#7C3AED;font-weight:700;margin-bottom:8px"></div>
      <label class="form-label">Hình thức</label>
      <select id="sp-ht" class="form-select mb-2">
        <option value="CK - Khách hàng" ${ht==='CK - Khách hàng'?'selected':''}>CK - Khách hàng</option>
        <option value="TM - Tài xế nộp quỹ" ${ht==='TM - Tài xế nộp quỹ'?'selected':''}>TM - Tài xế nộp quỹ</option>
        <option value="CK - Tài xế nộp">CK - Tài xế nộp</option>
      </select>
      <label class="form-label">Nội dung</label>
      <input id="sp-nd" type="text" class="form-control" placeholder="Nội dung CK..."></div>`,
    showCancelButton:true,confirmButtonText:'✅ Ghi nhận',cancelButtonText:'Hủy',confirmButtonColor:'#7C3AED',
    preConfirm:()=>{const a=document.getElementById('sp-amt').value;if(!a||a<=0){Swal.showValidationMessage('Nhập số tiền!');return false;}return{soTien:a};}
  });
  if(!fv)return;
  toggleLoader(true);
  setTimeout(()=>{
    toggleLoader(false);
    const cn=CONG_NO.find(x=>x.maCN===maCN);
    if(cn){cn.daThu+=Number(fv.soTien);cn.conNo=Math.max(0,cn.tongPT-cn.daThu);if(cn.conNo<=0)cn.ngayClear=new Date().toLocaleDateString('vi-VN');}
    Swal.fire({icon:'success',title:'Ghi nhận thành công!',html:`Thu: <b>${fmtVND(fv.soTien)}</b>`,timer:2000,showConfirmButton:false}).then(renderDebt);
  },500);
}

async function confirmClear(maCN){
  const{value:lyDo}=await Swal.fire({title:`🚫 Xóa nợ ${maCN}?`,input:'text',inputPlaceholder:'Lý do (bắt buộc)...',showCancelButton:true,confirmButtonText:'Xác nhận',confirmButtonColor:'#DC2626',inputValidator:v=>{if(!v)return'Nhập lý do!'}});
  if(!lyDo)return;
  const cn=CONG_NO.find(x=>x.maCN===maCN);
  if(cn)cn.ngayClear=new Date().toLocaleDateString('vi-VN');
  Swal.fire({icon:'success',title:'Đã xóa nợ!',text:maCN,timer:1500,showConfirmButton:false}).then(renderDebt);
}
